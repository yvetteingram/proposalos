<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProposalOS | Strategic Intelligence Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }

    /* Hide scrollbars for a cleaner app feel */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Premium Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Animations */
    @keyframes neural-pulse {
      0%   { transform: scale(1);    opacity: 0.4; }
      50%  { transform: scale(1.15); opacity: 0.8; }
      100% { transform: scale(1);    opacity: 0.4; }
    }
    .animate-neural { animation: neural-pulse 4s infinite ease-in-out; }

    @keyframes float {
      0%   { transform: translateY(0px);   }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0px);   }
    }
    .animate-float { animation: float 6s infinite ease-in-out; }

    /* Print Engine */
    @media print {
      @page { size: A4; margin: 2.5cm; }
      html, body { height: auto; background: #fff !important; }
      #root { display: none !important; }
      #print-container { display: block !important; visibility: visible !important; position: static !important; width: 100% !important; }
      .proposal-print-output { font-family: 'Lora', serif !important; font-size: 11.5pt !important; line-height: 1.75 !important; color: #000 !important; white-space: pre-wrap; }
      .watermark { position: fixed; bottom: 20px; right: 20px; font-size: 8pt; color: #ccc; font-family: 'Inter', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    }
    #print-container { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <div id="print-container"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
